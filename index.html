<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday ❤️</title>

<style>
body {
    margin: 0;
    padding: 0;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #ff9a9e, #fad0c4);
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    overflow: hidden;
}

.card {
    background: white;
    padding: 40px;
    border-radius: 20px;
    text-align: center;
    box-shadow: 0 20px 40px rgba(0,0,0,0.2);
    animation: fadeIn 2s ease-in-out;
}

h1 {
    font-size: 40px;
    color: #ff4b5c;
    margin-bottom: 10px;
}

p {
    font-size: 18px;
    color: #555;
}

button {
    margin-top: 20px;
    padding: 12px 25px;
    border: none;
    border-radius: 30px;
    background: #ff4b5c;
    color: white;
    font-size: 16px;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    background: #ff1e3c;
}

@keyframes fadeIn {
    from { opacity: 0; transform: scale(0.8); }
    to { opacity: 1; transform: scale(1); }
}

.confetti {
    position: fixed;
    width: 10px;
    height: 10px;
    background: red;
    top: -10px;
    animation: fall linear infinite;
}

@keyframes fall {
    to {
        transform: translateY(100vh) rotate(360deg);
    }
}
</style>
</head>

<body>

<div class="card">
    <h1>🎉 Happy Birthday, <span id="name">My Dear</span> 🎂</h1>
    <p>
        May your day be filled with love, happiness,  
        and all the success you deserve ❤️✨
    </p>
    <button onclick="celebrate()">Click for Surprise 🎁</button>
</div>

<script>
function celebrate() {
    alert("You are special! 💖 Stay blessed and keep smiling 😊");
    for (let i = 0; i < 50; i++) {
        let confetti = document.createElement("div");
        confetti.classList.add("confetti");
        confetti.style.left = Math.random() * 100 + "vw";
        confetti.style.backgroundColor = 
            ["#ff4b5c","#ffcc00","#00c3ff","#8aff00","#ff00c8"]
            [Math.floor(Math.random()*5)];
        confetti.style.animationDuration = (Math.random()*3+2)+"s";
        document.body.appendChild(confetti);

        setTimeout(() => confetti.remove(), 5000);
    }
}
</script>

</body>
</html>
