<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

<title>Happy Birthday Brother ❤️</title>

<style>

    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg,#ff9a9e,#fad0c4);
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.card {
    background:white;
    padding:40px;

    max-width:500px;
    box-shadow:0 20px 40px rgba(0,0,0,0.2);
}

h1 {
    color:#ff4b5c;
}

button {
    margin-top:20px;
    padding:12px 25px;
    border:none;
    border-radius:30px;
    background:#ff4b5c;
    color:white;
    font-size:16px;
    cursor:pointer;
}
</style>
</head>

<body>

<div class="card">
<h1>🎉 Happy Birthday My Brother ❤️</h1>

<p>
You are not just my brother… you are my best friend, my support, my everything.
</p>

<p>
I want you in my life forever.  
I want you to always stay happy.  
No matter what happens, I never want you to leave me.
</p>

<p>
May your life be filled with happiness, success and endless love 💖
</p>

<button onclick="goToSurprise()">Click for Surprise 🎁</button>

</html>
